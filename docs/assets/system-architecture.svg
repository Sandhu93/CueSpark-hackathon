<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc} .title{font:700 28px Inter,Arial,sans-serif;fill:#0f172a} .subtitle{font:500 14px Inter,Arial,sans-serif;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)} .blue{fill:#eef2ff;stroke:#6366f1} .cyan{fill:#ecfeff;stroke:#06b6d4} .green{fill:#f0fdf4;stroke:#22c55e} .orange{fill:#fff7ed;stroke:#f97316} .red{fill:#fef2f2;stroke:#ef4444}
      .label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a} .small{font:500 13px Inter,Arial,sans-serif;fill:#475569} .tiny{font:500 12px Inter,Arial,sans-serif;fill:#64748b}
      .group{font:700 13px Inter,Arial,sans-serif;fill:#475569;letter-spacing:.08em} .num{font:800 18px Inter,Arial,sans-serif;fill:#4f46e5}
      .line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)} .dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="60" y="58" class="title">CueSpark Interview Coach — System Architecture</text>
  <text x="60" y="86" class="subtitle">FastAPI + Next.js + workers + OpenAI audio + Postgres/pgvector + MinIO.</text>
  <text x="90" y="135" class="group">CLIENT LAYER</text>
  <rect x="60" y="155" width="260" height="130" class="box blue" rx="22"/>
  <text x="90" y="200" class="label">Next.js Frontend</text>
  <text x="90" y="228" class="small">Setup, interview UI, audio recording</text>
  <text x="90" y="252" class="small">Report and feedback screens</text>
  <text x="465" y="135" class="group">APPLICATION LAYER</text>
  <rect x="420" y="155" width="300" height="130" class="box cyan" rx="22"/>
  <text x="450" y="200" class="label">FastAPI Backend</text>
  <text x="450" y="228" class="small">Session APIs, upload APIs</text>
  <text x="450" y="252" class="small">AI orchestration endpoints</text>
  <rect x="420" y="365" width="300" height="130" class="box red" rx="22"/>
  <text x="450" y="410" class="label">Redis + RQ Worker</text>
  <text x="450" y="438" class="small">Parse, embed, transcribe</text>
  <text x="450" y="462" class="small">Evaluate and generate reports</text>
  <text x="825" y="135" class="group">AI SERVICES</text>
  <rect x="820" y="155" width="300" height="130" class="box orange" rx="22"/>
  <text x="850" y="200" class="label">OpenAI Services</text>
  <text x="850" y="228" class="small">TTS, transcription, embeddings</text>
  <text x="850" y="252" class="small">Question/report generation</text>
  <text x="148" y="548" class="group">STORAGE LAYER</text>
  <rect x="60" y="575" width="260" height="120" class="box green" rx="22"/>
  <text x="90" y="620" class="label">Postgres + pgvector</text>
  <text x="90" y="648" class="small">Sessions, questions, answers</text>
  <text x="90" y="672" class="small">Embeddings and reports</text>
  <rect x="820" y="575" width="300" height="120" class="box green" rx="22"/>
  <text x="850" y="620" class="label">MinIO Object Storage</text>
  <text x="850" y="648" class="small">Resume files, TTS audio</text>
  <text x="850" y="672" class="small">Candidate answer recordings</text>
  <path class="line" d="M320 220 C360 220 380 220 420 220"/><text x="340" y="207" class="tiny">REST</text>
  <path class="line" d="M570 285 L570 365"/><text x="590" y="330" class="tiny">enqueue job</text>
  <path class="line" d="M720 220 C770 220 770 220 820 220"/><text x="742" y="207" class="tiny">AI calls</text>
  <path class="line" d="M420 246 C310 330 230 450 190 575"/><text x="254" y="432" class="tiny">structured data</text>
  <path class="line" d="M720 246 C820 350 925 450 970 575"/><text x="878" y="432" class="tiny">file objects</text>
  <path class="line" d="M420 430 C330 470 260 520 210 575"/>
  <path class="line" d="M720 430 C820 470 900 520 955 575"/>
  <path class="line dash" d="M820 255 C745 320 665 358 615 375"/>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-label="CueSpark product user flow">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 32px Inter,Arial,sans-serif;fill:#0f172a}.subtitle{font:500 15px Inter,Arial,sans-serif;fill:#64748b}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.blue{fill:#eef2ff;stroke:#6366f1}.cyan{fill:#ecfeff;stroke:#06b6d4}.green{fill:#f0fdf4;stroke:#22c55e}.orange{fill:#fff7ed;stroke:#f97316}.red{fill:#fef2f2;stroke:#ef4444}.purple{fill:#faf5ff;stroke:#a855f7}.label{font:700 16px Inter,Arial,sans-serif;fill:#0f172a}.small{font:500 12px Inter,Arial,sans-serif;fill:#475569}.num{font:800 18px Inter,Arial,sans-serif;fill:#4f46e5}.line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.safe{font:700 12px Inter,Arial,sans-serif;fill:#92400e}
    </style>
  </defs>
  <rect class="bg" width="1400" height="900"/>
  <text x="55" y="56" class="title">CueSpark Product Flow</text>
  <text x="55" y="86" class="subtitle">From role setup to benchmark gaps, multimodal interview capture, modality agents, and final readiness report.</text>

  <rect x="55" y="135" width="250" height="115" rx="22" class="box blue"/>
  <text x="85" y="166" class="num">01</text><text x="85" y="198" class="label">Role Setup</text><text x="85" y="223" class="small">JD + resume + optional context</text>

  <rect x="365" y="135" width="250" height="115" rx="22" class="box cyan"/>
  <text x="395" y="166" class="num">02</text><text x="395" y="198" class="label">Prepare Session</text><text x="395" y="223" class="small">Parse, chunk, embed, role key</text>

  <rect x="675" y="135" width="250" height="115" rx="22" class="box purple"/>
  <text x="705" y="166" class="num">03</text><text x="705" y="198" class="label">Benchmark Compare</text><text x="705" y="223" class="small">Candidate vs role corpus</text>

  <rect x="985" y="135" width="250" height="115" rx="22" class="box purple"/>
  <text x="1015" y="166" class="num">04</text><text x="1015" y="198" class="label">Question Strategy</text><text x="1015" y="223" class="small">Gap-driven interview plan</text>

  <rect x="985" y="330" width="250" height="140" rx="22" class="box orange"/>
  <text x="1015" y="362" class="num">05</text><text x="1015" y="394" class="label">Interview Room</text><text x="1015" y="419" class="small">AI voice question</text><text x="1015" y="441" class="small">Response mode per question</text>

  <rect x="675" y="330" width="250" height="140" rx="22" class="box orange"/>
  <text x="705" y="362" class="num">06</text><text x="705" y="394" class="label">Capture Response</text><text x="705" y="419" class="small">Audio · text · code · mixed</text><text x="705" y="441" class="small">Optional visual signals</text>

  <rect x="365" y="330" width="250" height="140" rx="22" class="box red"/>
  <text x="395" y="362" class="num">07</text><text x="395" y="394" class="label">Run Agents</text><text x="395" y="419" class="small">Audio, text, code, video signal</text><text x="395" y="441" class="small">Benchmark gap coverage</text>

  <rect x="55" y="330" width="250" height="140" rx="22" class="box green"/>
  <text x="85" y="362" class="num">08</text><text x="85" y="394" class="label">Evaluate Answer</text><text x="85" y="419" class="small">Dynamic scoring by mode</text><text x="85" y="441" class="small">Strict feedback</text>

  <rect x="55" y="610" width="250" height="130" rx="22" class="box green"/>
  <text x="85" y="642" class="num">09</text><text x="85" y="674" class="label">Readiness Report</text><text x="85" y="699" class="small">Scores, risks, prep plan</text><text x="85" y="721" class="small">Resume improvements</text>

  <rect x="365" y="610" width="250" height="130" rx="22" class="box blue"/>
  <text x="395" y="642" class="num">10</text><text x="395" y="674" class="label">Improve + Rehearse</text><text x="395" y="699" class="small">Practice the exact weak areas</text><text x="395" y="721" class="small">Retake targeted interview</text>

  <rect x="675" y="610" width="560" height="130" rx="22" class="box red"/>
  <text x="705" y="647" class="label">Safety boundary</text>
  <text x="705" y="675" class="small">CueSpark reports observable communication and visual presence signals.</text>
  <text x="705" y="699" class="safe">No emotion detection · no true-confidence detection · no personality scoring · no hiring guarantee</text>

  <path class="line" d="M305 192 H365"/><path class="line" d="M615 192 H675"/><path class="line" d="M925 192 H985"/>
  <path class="line" d="M1110 250 V330"/><path class="line" d="M985 400 H925"/><path class="line" d="M675 400 H615"/><path class="line" d="M365 400 H305"/>
  <path class="line" d="M180 470 V610"/><path class="line" d="M305 675 H365"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-label="CueSpark candidate journey with benchmark dashboard">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 30px Inter,Arial,sans-serif;fill:#0f172a}.subtitle{font:500 15px Inter,Arial,sans-serif;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.blue{fill:#eef2ff;stroke:#6366f1}.cyan{fill:#ecfeff;stroke:#06b6d4}.green{fill:#f0fdf4;stroke:#22c55e}.orange{fill:#fff7ed;stroke:#f97316}.red{fill:#fef2f2;stroke:#ef4444}.purple{fill:#faf5ff;stroke:#a855f7}
      .label{font:700 17px Inter,Arial,sans-serif;fill:#0f172a}.small{font:500 12.5px Inter,Arial,sans-serif;fill:#475569}.num{font:800 18px Inter,Arial,sans-serif;fill:#4f46e5}.line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>
  <rect class="bg" width="1280" height="820"/>
  <text x="55" y="56" class="title">CueSpark Candidate Flow</text>
  <text x="55" y="84" class="subtitle">The current implementation flow: setup → match → benchmark gap dashboard → benchmark-driven interview → report.</text>

  <rect x="55" y="140" width="250" height="110" rx="22" class="box blue"/>
  <text x="85" y="172" class="num">01</text><text x="85" y="202" class="label">Enter JD</text><text x="85" y="226" class="small">Paste target job description</text>

  <rect x="380" y="140" width="250" height="110" rx="22" class="box blue"/>
  <text x="410" y="172" class="num">02</text><text x="410" y="202" class="label">Add Resume</text><text x="410" y="226" class="small">Upload PDF/DOCX/TXT or paste text</text>

  <rect x="705" y="140" width="250" height="110" rx="22" class="box cyan"/>
  <text x="735" y="172" class="num">03</text><text x="735" y="202" class="label">Prepare Session</text><text x="735" y="226" class="small">Parse, chunk, embed, infer role</text>

  <rect x="1030" y="140" width="205" height="110" rx="22" class="box green"/>
  <text x="1060" y="172" class="num">04</text><text x="1060" y="202" class="label">JD Match</text><text x="1060" y="226" class="small">Fit score + role key</text>

  <rect x="1030" y="335" width="205" height="135" rx="22" class="box purple"/>
  <text x="1060" y="367" class="num">05</text><text x="1060" y="397" class="label">Benchmark Gap</text><text x="1060" y="421" class="small">Compare against curated</text><text x="1060" y="443" class="small">role benchmark profiles</text>

  <rect x="705" y="335" width="250" height="135" rx="22" class="box purple"/>
  <text x="735" y="367" class="num">06</text><text x="735" y="397" class="label">Question Strategy</text><text x="735" y="421" class="small">Questions target missing metrics,</text><text x="735" y="443" class="small">ownership, evidence, skill gaps</text>

  <rect x="380" y="335" width="250" height="135" rx="22" class="box orange"/>
  <text x="410" y="367" class="num">07</text><text x="410" y="397" class="label">Voice Interview</text><text x="410" y="421" class="small">Hear strict AI interviewer</text><text x="410" y="443" class="small">Record one answer per turn</text>

  <rect x="55" y="335" width="250" height="135" rx="22" class="box orange"/>
  <text x="85" y="367" class="num">08</text><text x="85" y="397" class="label">Evaluate Answer</text><text x="85" y="421" class="small">Transcribe, signal analysis,</text><text x="85" y="443" class="small">benchmark-gap coverage score</text>

  <rect x="55" y="585" width="250" height="120" rx="22" class="box green"/>
  <text x="85" y="617" class="num">09</text><text x="85" y="647" class="label">Final Report</text><text x="85" y="671" class="small">Readiness, benchmark similarity,</text><text x="85" y="693" class="small">evidence gaps, prep plan</text>

  <rect x="380" y="585" width="250" height="120" rx="22" class="box red"/>
  <text x="410" y="617" class="num">10</text><text x="410" y="647" class="label">Improve Resume</text><text x="410" y="671" class="small">Upgrade weak bullets based</text><text x="410" y="693" class="small">on benchmark gaps</text>

  <path class="line" d="M305 195 H380"/><path class="line" d="M630 195 H705"/><path class="line" d="M955 195 H1030"/>
  <path class="line" d="M1132 250 V335"/><path class="line" d="M1030 402 H955"/><path class="line" d="M705 402 H630"/><path class="line" d="M380 402 H305"/>
  <path class="line" d="M180 470 V585"/><path class="line" d="M305 645 H380"/>
</svg>

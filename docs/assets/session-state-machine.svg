<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc} .title{font:700 28px Inter,Arial,sans-serif;fill:#0f172a} .subtitle{font:500 14px Inter,Arial,sans-serif;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)} .blue{fill:#eef2ff;stroke:#6366f1} .cyan{fill:#ecfeff;stroke:#06b6d4} .green{fill:#f0fdf4;stroke:#22c55e} .orange{fill:#fff7ed;stroke:#f97316} .red{fill:#fef2f2;stroke:#ef4444}
      .label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a} .small{font:500 13px Inter,Arial,sans-serif;fill:#475569} .tiny{font:500 12px Inter,Arial,sans-serif;fill:#64748b}
      .group{font:700 13px Inter,Arial,sans-serif;fill:#475569;letter-spacing:.08em} .num{font:800 18px Inter,Arial,sans-serif;fill:#4f46e5}
      .line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)} .dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect class="bg" width="1200" height="620"/>
  <text x="60" y="58" class="title">Interview Session State Machine</text>
  <text x="60" y="86" class="subtitle">A constrained flow keeps the first release reliable and prevents scope creep.</text>
  <rect x="60" y="165" width="190" height="86" class="box blue" rx="22"/>
  <text x="92" y="202" class="label">draft</text><text x="92" y="226" class="small">JD/resume entered</text>
  <rect x="330" y="165" width="190" height="86" class="box cyan" rx="22"/>
  <text x="362" y="202" class="label">preparing</text><text x="362" y="226" class="small">parse + embed + plan</text>
  <rect x="600" y="165" width="190" height="86" class="box green" rx="22"/>
  <text x="632" y="202" class="label">ready</text><text x="632" y="226" class="small">questions available</text>
  <rect x="870" y="165" width="190" height="86" class="box orange" rx="22"/>
  <text x="902" y="202" class="label">in_progress</text><text x="902" y="226" class="small">turn-based interview</text>
  <rect x="870" y="365" width="190" height="86" class="box cyan" rx="22"/>
  <text x="902" y="402" class="label">evaluating</text><text x="902" y="426" class="small">transcribe + score</text>
  <rect x="600" y="365" width="190" height="86" class="box green" rx="22"/>
  <text x="632" y="402" class="label">report_ready</text><text x="632" y="426" class="small">final report created</text>
  <rect x="330" y="365" width="190" height="86" class="box red" rx="22"/>
  <text x="362" y="402" class="label">completed</text><text x="362" y="426" class="small">session finished</text>
  <rect x="60" y="365" width="190" height="86" class="box red" rx="22"/>
  <text x="92" y="402" class="label">failed</text><text x="92" y="426" class="small">recoverable error</text>
  <path class="line" d="M250 208 H330"/><path class="line" d="M520 208 H600"/><path class="line" d="M790 208 H870"/>
  <path class="line" d="M965 251 V365"/><path class="line" d="M870 408 H790"/><path class="line" d="M600 408 H520"/>
  <path class="line dash" d="M930 365 C810 300 940 250 950 251"/><text x="770" y="318" class="small">next question</text>
  <path class="line dash" d="M330 390 C250 360 230 315 240 251"/>
  <path class="line dash" d="M600 390 C445 320 265 330 225 365"/>
</svg>

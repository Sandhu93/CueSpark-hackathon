<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="950" viewBox="0 0 1400 950" role="img" aria-label="CueSpark product data and storage model">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.12"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 32px Inter,Arial,sans-serif;fill:#0f172a}.subtitle{font:500 15px Inter,Arial,sans-serif;fill:#64748b}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)}.green{fill:#f0fdf4;stroke:#22c55e}.blue{fill:#eef2ff;stroke:#6366f1}.orange{fill:#fff7ed;stroke:#f97316}.purple{fill:#faf5ff;stroke:#a855f7}.cyan{fill:#ecfeff;stroke:#06b6d4}.red{fill:#fef2f2;stroke:#ef4444}.label{font:700 15px Inter,Arial,sans-serif;fill:#0f172a}.small{font:500 11.5px Inter,Arial,sans-serif;fill:#475569}.group{font:700 13px Inter,Arial,sans-serif;fill:#475569;letter-spacing:.08em}.line{stroke:#334155;stroke-width:2.2;fill:none;marker-end:url(#arrow)}.warn{font:700 11px Inter,Arial,sans-serif;fill:#92400e}
    </style>
  </defs>
  <rect class="bg" width="1400" height="950"/>
  <text x="55" y="56" class="title">CueSpark Data + Storage Model</text>
  <text x="55" y="86" class="subtitle">Structured interview state, benchmark intelligence, multimodal responses, agent outputs, and readiness reports.</text>

  <rect x="45" y="125" width="910" height="735" rx="28" class="box green"/>
  <text x="80" y="165" class="group">POSTGRES + PGVECTOR</text>

  <rect x="80" y="195" width="210" height="72" rx="16" class="box"/>
  <text x="102" y="226" class="label">interview_sessions</text><text x="102" y="249" class="small">status, role_key, scores</text>
  <rect x="335" y="195" width="190" height="72" rx="16" class="box"/>
  <text x="357" y="226" class="label">documents</text><text x="357" y="249" class="small">JD/resume parse state</text>
  <rect x="570" y="195" width="180" height="72" rx="16" class="box purple"/>
  <text x="592" y="226" class="label">benchmark_profiles</text><text x="592" y="249" class="small">role corpus</text>
  <rect x="790" y="195" width="130" height="72" rx="16" class="box orange"/>
  <text x="812" y="226" class="label">embedding_chunks</text><text x="812" y="249" class="small">vectors</text>

  <rect x="80" y="320" width="210" height="78" rx="16" class="box purple"/>
  <text x="102" y="352" class="label">benchmark_comparisons</text><text x="102" y="375" class="small">gaps, risks, targets</text>
  <rect x="335" y="320" width="190" height="78" rx="16" class="box"/>
  <text x="357" y="352" class="label">interview_questions</text><text x="357" y="375" class="small">mode + gap refs</text>
  <rect x="570" y="320" width="180" height="78" rx="16" class="box"/>
  <text x="592" y="352" class="label">candidate_answers</text><text x="592" y="375" class="small">audio/text/code keys</text>
  <rect x="790" y="320" width="130" height="78" rx="16" class="box red"/>
  <text x="812" y="352" class="label">agent_results</text><text x="812" y="375" class="small">modality outputs</text>

  <rect x="80" y="450" width="210" height="78" rx="16" class="box"/>
  <text x="102" y="482" class="label">answer_evaluations</text><text x="102" y="505" class="small">final answer scores</text>
  <rect x="335" y="450" width="190" height="78" rx="16" class="box"/>
  <text x="357" y="482" class="label">interview_reports</text><text x="357" y="505" class="small">readiness + plan</text>
  <rect x="570" y="450" width="180" height="78" rx="16" class="box cyan"/>
  <text x="592" y="482" class="label">interviewer_contexts</text><text x="592" y="505" class="small">optional profile PDF/text</text>
  <rect x="790" y="450" width="130" height="78" rx="16" class="box red"/>
  <text x="812" y="482" class="label">jobs</text><text x="812" y="505" class="small">worker state</text>

  <rect x="125" y="610" width="745" height="155" rx="18" class="box cyan"/>
  <text x="155" y="648" class="label">Response and agent payloads</text>
  <text x="155" y="676" class="small">candidate_answers stores response mode: spoken_answer · written_answer · code_answer · mixed_answer</text>
  <text x="155" y="702" class="small">agent_results stores outputs from audio, text, code, video_signal, benchmark_gap, and final_orchestrator agents</text>
  <text x="155" y="728" class="small">embedding_chunks stores jd · resume · benchmark_profile · answer · rubric · question_bank vectors</text>

  <path class="line" d="M290 231 H335"/><path class="line" d="M525 231 H570"/><path class="line" d="M750 231 H790"/>
  <path class="line" d="M185 267 V320"/><path class="line" d="M430 267 V320"/><path class="line" d="M660 267 V320"/><path class="line" d="M855 267 V320"/>
  <path class="line" d="M660 398 V450"/><path class="line" d="M855 398 V450"/><path class="line" d="M185 398 V450"/>

  <rect x="1010" y="125" width="335" height="315" rx="28" class="box blue"/>
  <text x="1045" y="165" class="group">MINIO OBJECT STORAGE</text>
  <rect x="1045" y="195" width="255" height="56" rx="16" class="box blue"/>
  <text x="1065" y="229" class="label">resumes/original/</text>
  <rect x="1045" y="272" width="255" height="56" rx="16" class="box blue"/>
  <text x="1065" y="306" class="label">audio/questions/</text>
  <rect x="1045" y="349" width="255" height="56" rx="16" class="box blue"/>
  <text x="1065" y="383" class="label">audio/answers/</text>

  <rect x="1010" y="500" width="335" height="270" rx="28" class="box purple"/>
  <text x="1045" y="540" class="group">CURATED INPUTS</text>
  <rect x="1045" y="570" width="255" height="66" rx="16" class="box purple"/>
  <text x="1065" y="599" class="label">fixtures/benchmarks/</text><text x="1065" y="621" class="small">curated role archetypes</text>
  <rect x="1045" y="665" width="255" height="66" rx="16" class="box purple"/>
  <text x="1065" y="694" class="label">No default scraping</text><text x="1065" y="716" class="warn">use user-provided files/text only</text>

  <path class="line" d="M955 232 C990 226 1010 224 1045 224"/>
  <path class="line" d="M955 359 C990 330 1010 306 1045 300"/>
  <path class="line" d="M955 360 C1000 370 1020 378 1045 377"/>
  <path class="line" d="M1010 603 C960 580 925 535 870 505"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc} .title{font:700 28px Inter,Arial,sans-serif;fill:#0f172a} .subtitle{font:500 14px Inter,Arial,sans-serif;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)} .blue{fill:#eef2ff;stroke:#6366f1} .cyan{fill:#ecfeff;stroke:#06b6d4} .green{fill:#f0fdf4;stroke:#22c55e} .orange{fill:#fff7ed;stroke:#f97316} .red{fill:#fef2f2;stroke:#ef4444}
      .label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a} .small{font:500 13px Inter,Arial,sans-serif;fill:#475569} .tiny{font:500 12px Inter,Arial,sans-serif;fill:#64748b}
      .group{font:700 13px Inter,Arial,sans-serif;fill:#475569;letter-spacing:.08em} .num{font:800 18px Inter,Arial,sans-serif;fill:#4f46e5}
      .line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)} .dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect class="bg" width="1200" height="760"/>
  <text x="60" y="58" class="title">Database + Storage Model</text>
  <text x="60" y="86" class="subtitle">Structured interview state stays in Postgres; large artifacts stay in MinIO; semantic search uses pgvector.</text>
  <rect x="60" y="130" width="680" height="560" class="box green" rx="28"/>
  <text x="95" y="172" class="label">Postgres + pgvector</text>
  <rect x="95" y="205" width="270" height="70" class="box " rx="16"/>
  <text x="120" y="235" class="label">interview_sessions</text><text x="120" y="257" class="small">JD, resume text, status, scores</text>
  <rect x="435" y="205" width="270" height="70" class="box " rx="16"/>
  <text x="460" y="235" class="label">documents</text><text x="460" y="257" class="small">resume/JD source, parser status</text>
  <rect x="95" y="320" width="270" height="70" class="box " rx="16"/>
  <text x="120" y="350" class="label">interview_questions</text><text x="120" y="372" class="small">category, text, difficulty, TTS key</text>
  <rect x="435" y="320" width="270" height="70" class="box " rx="16"/>
  <text x="460" y="350" class="label">candidate_answers</text><text x="460" y="372" class="small">audio key, transcript, metrics</text>
  <rect x="95" y="435" width="270" height="70" class="box " rx="16"/>
  <text x="120" y="465" class="label">answer_evaluations</text><text x="120" y="487" class="small">rubric scores and feedback</text>
  <rect x="435" y="435" width="270" height="70" class="box " rx="16"/>
  <text x="460" y="465" class="label">interview_reports</text><text x="460" y="487" class="small">final readiness report</text>
  <rect x="245" y="550" width="310" height="80" class="box orange" rx="16"/>
  <text x="270" y="580" class="label">embedding_chunks</text><text x="270" y="602" class="small">JD, resume, rubric, answer, question bank vectors</text>
  <path class="line" d="M365 240 H435"/><path class="line" d="M230 275 V320"/><path class="line" d="M570 275 V320"/><path class="line" d="M365 355 H435"/><path class="line" d="M570 390 V435"/><path class="line" d="M230 505 C245 535 260 545 290 550"/><path class="line" d="M570 505 C555 535 540 545 510 550"/>

  <rect x="820" y="130" width="320" height="560" class="box blue" rx="28"/>
  <text x="855" y="172" class="label">MinIO Object Storage</text>
  <rect x="855" y="215" width="250" height="70" class="box blue" rx="16"/>
  <text x="880" y="245" class="label">resumes/original/</text><text x="880" y="267" class="small">uploaded PDF/DOCX files</text>
  <rect x="855" y="330" width="250" height="70" class="box blue" rx="16"/>
  <text x="880" y="360" class="label">audio/questions/</text><text x="880" y="382" class="small">AI interviewer voice files</text>
  <rect x="855" y="445" width="250" height="70" class="box blue" rx="16"/>
  <text x="880" y="475" class="label">audio/answers/</text><text x="880" y="497" class="small">candidate recordings</text>
  <rect x="855" y="560" width="250" height="70" class="box blue" rx="16"/>
  <text x="880" y="590" class="label">reports/</text><text x="880" y="612" class="small">optional exported JSON/PDF later</text>
  <path class="line" d="M705 240 C760 240 790 250 855 250"/>
  <path class="line" d="M705 355 C760 355 790 365 855 365"/>
  <path class="line" d="M705 355 C760 420 790 480 855 480"/>
  <path class="line" d="M705 470 C760 520 790 595 855 595"/>
</svg>

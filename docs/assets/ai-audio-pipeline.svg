<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img">
  <defs>
    <filter id="shadow"><feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity="0.13"/></filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth"><path d="M2,2 L10,6 L2,10 Z" fill="#334155"/></marker>
    <style>
      .bg{fill:#f8fafc} .title{font:700 28px Inter,Arial,sans-serif;fill:#0f172a} .subtitle{font:500 14px Inter,Arial,sans-serif;fill:#64748b}
      .box{fill:#fff;stroke:#cbd5e1;stroke-width:2;filter:url(#shadow)} .blue{fill:#eef2ff;stroke:#6366f1} .cyan{fill:#ecfeff;stroke:#06b6d4} .green{fill:#f0fdf4;stroke:#22c55e} .orange{fill:#fff7ed;stroke:#f97316} .red{fill:#fef2f2;stroke:#ef4444}
      .label{font:700 18px Inter,Arial,sans-serif;fill:#0f172a} .small{font:500 13px Inter,Arial,sans-serif;fill:#475569} .tiny{font:500 12px Inter,Arial,sans-serif;fill:#64748b}
      .group{font:700 13px Inter,Arial,sans-serif;fill:#475569;letter-spacing:.08em} .num{font:800 18px Inter,Arial,sans-serif;fill:#4f46e5}
      .line{stroke:#334155;stroke-width:2.4;fill:none;marker-end:url(#arrow)} .dash{stroke-dasharray:7 7}
    </style>
  </defs>
  <rect class="bg" width="1200" height="720"/>
  <text x="60" y="58" class="title">AI Voice + Transcription Pipeline</text>
  <text x="60" y="86" class="subtitle">Reliable turn-based audio pipeline for question playback, answer recording, transcription, and evaluation.</text>
  <rect x="60" y="130" width="1080" height="130" class="box" rx="28"/><text x="85" y="162" class="group">QUESTION VOICE</text>
  <rect x="120" y="175" width="210" height="58" class="box cyan" rx="20"/><text x="145" y="210" class="label">Question Text</text>
  <rect x="440" y="175" width="210" height="58" class="box orange" rx="20"/><text x="465" y="210" class="label">OpenAI TTS</text>
  <rect x="760" y="175" width="230" height="58" class="box green" rx="20"/><text x="785" y="210" class="label">Store MP3 in MinIO</text>
  <path class="line" d="M330 204 H440"/><path class="line" d="M650 204 H760"/>

  <rect x="60" y="305" width="1080" height="130" class="box" rx="28"/><text x="85" y="337" class="group">CANDIDATE ANSWER</text>
  <rect x="120" y="350" width="210" height="58" class="box blue" rx="20"/><text x="145" y="385" class="label">Play Question</text>
  <rect x="440" y="350" width="210" height="58" class="box blue" rx="20"/><text x="465" y="385" class="label">Record Answer</text>
  <rect x="760" y="350" width="210" height="58" class="box green" rx="20"/><text x="785" y="385" class="label">Upload Audio</text>
  <path class="line" d="M330 379 H440"/><path class="line" d="M650 379 H760"/>

  <rect x="60" y="480" width="1080" height="150" class="box" rx="28"/><text x="85" y="512" class="group">TRANSCRIBE + EVALUATE</text>
  <rect x="95" y="535" width="200" height="58" class="box orange" rx="20"/><text x="120" y="570" class="label">Transcription</text>
  <rect x="375" y="535" width="200" height="58" class="box cyan" rx="20"/><text x="400" y="570" class="label">Signal Analysis</text>
  <rect x="655" y="535" width="200" height="58" class="box orange" rx="20"/><text x="680" y="570" class="label">LLM Evaluation</text>
  <rect x="935" y="535" width="160" height="58" class="box green" rx="20"/><text x="960" y="570" class="label">Save Scores</text>
  <path class="line" d="M295 564 H375"/><path class="line" d="M575 564 H655"/><path class="line" d="M855 564 H935"/>
  <path class="line" d="M865 233 C865 265 865 310 865 350"/>
  <path class="line" d="M865 408 C865 455 230 470 195 535"/>
</svg>
